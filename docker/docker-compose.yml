services:
  app:
    build: .
    volumes:
      - ./src:/var/www/html
    ports:
      - "8080:80"
    networks:
      - app-network  # ここで指定

  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:       # ここで定義
    driver: bridge